profile:
  name: "Tu Nombre"
  email: "tu@email.com"
  phone: "+1 555 123 4567"
  cv_path: "data/cv.pdf"

search:
  keywords:
    - "sysadmin"
    - "linux administrator"
    - "devops engineer"
    - "site reliability engineer"
    - "cloud engineer"
    # Agrega los roles que buscas
  locations:
    - "remote"
    - "remoto"
    - "Tu Ciudad"
    # Agrega tu ciudad o región
  remote_preference: true
  exclude_keywords:
    - "junior"
    - "intern"
    - "practicante"
    - "becario"
    - "security clearance"
    # Agrega palabras que quieras filtrar
  exclude_titles: []
  exclude_locations: []

email:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender: "tu@email.com"
  # Para obtener tu App Password de Gmail:
  # 1. Ve a myaccount.google.com/security
  # 2. Activa verificación en 2 pasos
  # 3. Busca "Contraseñas de aplicaciones" y genera una
  app_password: ""

cover_letter:
  language: "auto"  # "auto" detecta el idioma de la vacante, o "es" / "en"
  tone: "professional"
  max_length: 400   # palabras aproximadas
